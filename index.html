<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Login</h2>
<button id="loginBtn">Sign in with Google</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuapWoAiZKhkNOfUos9ZuvzisS39YGs1o",
  authDomain: "skibidilogin-bbf42.firebaseapp.com",
  projectId: "skibidilogin-bbf42",
  storageBucket: "skibidilogin-bbf42.firebasestorage.app",
  messagingSenderId: "1008118855931",
  appId: "1:1008118855931:web:fb7784385be188150d585e",
  measurementId: "G-JJX8RGZ210"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const provider = new GoogleAuthProvider();

document.getElementById("loginBtn").onclick = async () => {

  const result = await signInWithPopup(auth, provider);
  const user = result.user;

  const snap = await getDoc(doc(db, "users", user.uid));

  if (snap.exists() && snap.data().username) {
    window.location = "skibidi.html";
  } else {
    window.location = "username.html";
  }

};

</script>

</body>
</html>
